<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draft Arca De Noé</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Draft Arca De Noé</h1>
        <p>Onde lendas são criadas.</p>
    </header>

    <nav>
        <a href="#">Início</a>
        <a href="#">História</a>
        <a href="#">Edições</a>
        <a href="#">Participantes</a>
        <a href="#">Discord</a>
    </nav>

    <main>
        <section class="parallax" id="img1"></section>

        <section>
            <h2 class="title">O Draft em Números</h2>
            <div class="cards">
                <div class="card" id="card1">
                    <img src="imgs/trophy.png" alt="trophy">
                    <h2>Edições</h2>
                    <p>8</p>
                </div>
                <div class="card" id="card2">
                    <img src="imgs/coach.png" alt="coach">
                    <h2>Participantes</h2>
                    <p>8</p>
                </div>
                <div class="card" id="card3">
                    <img src="imgs/ball.png" alt="soccer ball">
                    <h2>Total de gols</h2>
                    <p>7.525</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p style="padding-bottom: 50vh;">a</p>
    </footer>
</body>
</html>
